<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
<div class="contenedor">
    <h2>
        Bienvenido
    </h2>
    <p>Inicia sesion para continuar</p>
</div><br><br>
<div class="formulario">
    <br>

    <form action="/loginUsuario" method="POST">
        <label>Correo electrónico:</label><br><br>
        <input type="email" name="correo" placeholder="ejemplo@correo.com" required>
        <br><br>

        <label>Contraseña:</label><br><br>
        <input type="password" name="password" placeholder="Escribe tu contraseña" required>
        <br><br>

        <p id="mensajeError" style="color: #ff4444; display: none; font-size: 14px; text-align: center; font-weight: bold;">
            ❌ Correo o contraseña incorrectos.
        </p>

        <button type="submit" style="padding: 10px 20px; cursor: pointer; border-radius: 5px;">Iniciar sesión</button>
    </form>

    <br>
    <hr><p>Regístrate si aún no tienes cuenta</p><hr><br>
    <a href="Registro.html">Regístrate</a>
</div>
<section class="super">
    <section>
        <div class="particulas">
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
            <span class="particula"></span>
        </div>
    </section>
</section>
<script>
    const urlParams = new URLSearchParams(window.location.search);

    if (urlParams.has('error')) {
        document.getElementById('mensajeError').style.display = 'block';
    }
</script>
</body>
</html>
