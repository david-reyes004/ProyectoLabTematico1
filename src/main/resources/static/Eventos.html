<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/Eventos.css">
    <link rel="stylesheet" href="css/ORGeventos.css">
    <title>Eventos</title>
</head>
<body>
<header>
    <nav class="encabezado">
        <button class="boton-img"><img src="imagenes/Logo.jpeg" alt="inicio"></button>
        <a href="paginaPrincipal.html">INICIO</a>
        <a href="">EVENTOS</a>
        <a href="miseventos.html">MIS EVENTOS</a>
        <a href="iniciarSesion.html">CERRAR SESION</a>
    </nav>
</header>
<main>
    <div class="letrero">
        <h1>Cartelera de Eventos</h1>
    </div>

    <div id="ContenedorDeEventos"
    class="eventos-grid">
        <p>Cargando Cartelera...</p>
    </div>
</main>
<div id="modalPresentaciones" class="modal-oculto">
    <div class="modal-contenido">
        <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
        <h2 id="tituloModal">Presentaciones</h2>
        <hr class="linea">
        <div id="listaPresentaciones" class="grid-presentaciones">
            <p>Cargando artistas...</p>
        </div>
    </div>
</div>

<style>
    .modal-oculto {
        display: none; position: fixed; z-index: 1000; left: 0; top: 0;
        width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
        backdrop-filter: blur(5px);
    }
    .modal-contenido {
        background-color: #1a1a1a; margin: 10% auto; padding: 25px;
        border: 1px solid #00d2ff; border-radius: 15px; width: 80%;
        max-width: 600px; color: white; box-shadow: 0px 0px 20px rgba(0, 210, 255, 0.4);
    }
    .cerrar-modal {
        color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;
    }
    .cerrar-modal:hover { color: white; }
    .presentacion-card {
        background: #2a2a2a; border-left: 4px solid #00d2ff;
        padding: 15px; margin-top: 15px; border-radius: 8px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .btn-presentacion {
        background-color: #00d2ff; color: #000; border: none;
        padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
    }
    .btn-presentacion:hover { background-color: #0099cc; }
</style>
</body>
<script src="js/Eventos.js"></script>
<script src="js/AccionesEventos.js"></script>
</html>
