<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/Eventos.css">
    <title>Eventos</title>
</head>
<body>
<header>
    <nav class="encabezado">
        <button class="boton-img"><img src="imagenes/Logo.jpeg" alt="inicio"></button>
        <a href="PaginaPrincipal.html">INICIO</a>
        <a href="">EVENTOS</a>
        <a href="">MIS EVENTOS</a>
        <a href="">ACERCA DE</a>
        <a href="IniciarSesion.html">CERRAR SESION</a>
    </nav>
</header>
<main>
    <div class="letrero">
        <h1>Eventos</h1>
        <h2 id="saludo" style="text-align: center; margin-top: 20px; color: white; font-family: 'Poppins', sans-serif;">¡Hola, bienvenido!</h2>
    </div>
</main>
<script>
    const nombreGuardado = localStorage.getItem('usuarioDataFestival');

    if (nombreGuardado) {
        document.getElementById('saludo').innerText = '¡Hola, ' + nombreGuardado + '!';
    }

    function cerrarSesion() {
        localStorage.removeItem('usuarioDataFestival');
    }
</script>
</body>
</html>
